---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maydaylabs-frontend
  namespace: maydaylabs-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maydaylabs-frontend
  template:
    metadata:
      labels:
        app: maydaylabs-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: ${REGISTRY}/maydaylabs-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # These are baked into the Next.js build — set at build time via Docker ARG
            # or override here for server-side rendering environment
            - name: NEXT_PUBLIC_API_URL
              value: "https://maydaylabs.dremer10.com"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://maydaylabs.dremer10.com"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: maydaylabs-frontend
  namespace: maydaylabs-system
spec:
  selector:
    app: maydaylabs-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
