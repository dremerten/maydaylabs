---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-maydaylabs
spec:
  acme:
    email: ${EMAIL}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-maydaylabs-key
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: global-gateway
            namespace: nginx-gateway
            sectionName: acme-http
