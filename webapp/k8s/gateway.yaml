---
# Adds the maydaylabs HTTPS listener to the shared cluster gateway.
#
# IMPORTANT: spec.listeners is an atomic list in this CRD version — do NOT use
# kubectl apply or server-side apply, which would wipe all other listeners.
# Instead use the JSON patch command shown in .staging_deployment.md:
#
#   kubectl patch gateway global-gateway -n nginx-gateway --type=json \
#     -p='[{"op":"add","path":"/spec/listeners/-","value":{"name":"maydaylabs","hostname":"maydaylabs.dremer10.com","port":443,"protocol":"HTTPS","tls":{"mode":"Terminate","certificateRefs":[{"name":"maydaylabs-tls","kind":"Secret"}]},"allowedRoutes":{"namespaces":{"from":"All"}}}}]'
#
# This file is kept as a reference for the listener spec.
# The idempotent helper that checks-before-adding is in .staging_deployment.md.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: global-gateway
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  listeners:
  - name: maydaylabs
    hostname: maydaylabs.dremer10.com
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: maydaylabs-tls
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All
