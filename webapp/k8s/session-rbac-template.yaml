# This file is a documentation reference only.
# The backend (session.py) creates these resources programmatically in Python
# using the kubernetes client. The Role and RoleBinding are created in the
# session namespace (k8squest-{session_id}) with SA name maydaylabs-player-{session_id}.
#
# Equivalent YAML for reference:
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maydaylabs-player-SESSION_ID
  namespace: maydaylabs-SESSION_ID
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maydaylabs-player-SESSION_ID
  namespace: maydaylabs-SESSION_ID
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - pods/log
      - pods/status
      - services
      - endpoints
      - configmaps
      - secrets
      - persistentvolumeclaims
      - events
      - serviceaccounts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maydaylabs-player-SESSION_ID
  namespace: maydaylabs-SESSION_ID
subjects:
  - kind: ServiceAccount
    name: maydaylabs-player-SESSION_ID
    namespace: maydaylabs-SESSION_ID
roleRef:
  kind: Role
  name: maydaylabs-player-SESSION_ID
  apiGroup: rbac.authorization.k8s.io
