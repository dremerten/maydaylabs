services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: webapp/images/backend/Dockerfile
    restart: unless-stopped
    environment:
      K8SQUEST_REDIS_URL: ${K8SQUEST_REDIS_URL}
      K8SQUEST_ENGINE_IMAGE: ${REGISTRY}/maydaylabs-engine:latest
      K8SQUEST_SHELL_IMAGE: ${REGISTRY}/maydaylabs-shell:latest
      K8SQUEST_KUBE_CONTEXT: k3s-k8squest
      KUBECONFIG: /home/k8squest/.kube/config
    volumes:
      - ${HOME}/.kube/config:/home/k8squest/.kube/config:ro
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: webapp/images/frontend/Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped

  proxy:
    image: nginx:1.30-alpine3.23
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./webapp/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
